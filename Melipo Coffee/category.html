<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melipo Coffee | Menü</title>
    <!-- Google Fonts: Outfit for sleek body text, Playfair Display for elegant headings -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button class="theme-toggle" id="theme-toggle" aria-label="Temayı Değiştir">
        <svg class="sun-icon" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
        <svg class="moon-icon" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
    </button>
    <div class="app-container" id="category-container">
        <!-- Top Nav -->
        <nav class="top-nav">
            <a href="index.html" class="back-btn">
                <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" /></svg>
                Menüye Dön
            </a>
        </nav>

        <!-- Category Header -->
        <header class="cat-header" id="cat-header">
            <div class="cat-overlay"></div>
            <h1 id="cat-title">Yükleniyor...</h1>
        </header>

        <!-- Product List -->
        <main class="product-list" id="product-list">
            <!-- Items injected via JS -->
        </main>

        <!-- Lightbox Container -->
        <div id="image-lightbox" class="lightbox">
            <span class="lightbox-close">&times;</span>
            <img class="lightbox-content" id="lightbox-img" alt="Büyük Ürün Görseli">
        </div>

        <!-- Footer -->
        <footer class="footer">
            <div class="footer-divider"></div>
            <p>&copy; 2026 Melipo Coffee. Tüm hakları saklıdır.</p>
        </footer>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
