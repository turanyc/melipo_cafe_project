<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melipo Coffee | QR Menü</title>
    <meta name="description" content="Melipo Coffee'deki el yapımı içecekleri ve nefis tatlıları keşfedin.">
    <!-- Google Fonts: Outfit for sleek body text, Playfair Display for elegant headings -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button class="theme-toggle" id="theme-toggle" aria-label="Temayı Değiştir">
        <svg class="sun-icon" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
        <svg class="moon-icon" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
    </button>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="logo-container">
                <img src="assets/img/logo.png" alt="Melipo Coffee Logo" class="logo">
            </div>
            <h1 class="cafe-name">Melipo Coffee</h1>
            <p class="subtitle">El yapımı içecekler & nefis tatlılar</p>
        </header>

        <!-- Main Content -->
        <main class="menu-categories">
            <a href="category.html?type=desserts" class="category-card bg-desserts" aria-label="Tatlıları İncele">
                <div class="card-overlay"></div>
                <div class="card-content">
                    <h2>Tatlılar</h2>
                    <span class="explore-text">Keşfet
                        <svg class="arrow-icon" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><path stroke-linecap="round" stroke-linejoin="round" d="M17 8l4 4m0 0l-4 4m4-4H3" /></svg>
                    </span>
                </div>
            </a>
            <a href="category.html?type=hot-drinks" class="category-card bg-hot-drinks" aria-label="Sıcak İçecekleri İncele">
                <div class="card-overlay"></div>
                <div class="card-content">
                    <h2>Sıcak İçecekler</h2>
                    <span class="explore-text">Keşfet
                        <svg class="arrow-icon" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><path stroke-linecap="round" stroke-linejoin="round" d="M17 8l4 4m0 0l-4 4m4-4H3" /></svg>
                    </span>
                </div>
            </a>
            <a href="category.html?type=cold-drinks" class="category-card bg-cold-drinks" aria-label="Soğuk İçecekleri İncele">
                <div class="card-overlay"></div>
                <div class="card-content">
                    <h2>Soğuk İçecekler</h2>
                    <span class="explore-text">Keşfet
                        <svg class="arrow-icon" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><path stroke-linecap="round" stroke-linejoin="round" d="M17 8l4 4m0 0l-4 4m4-4H3" /></svg>
                    </span>
                </div>
            </a>
            <a href="category.html?type=cakes" class="category-card bg-cakes" aria-label="Pastaları İncele">
                <div class="card-overlay"></div>
                <div class="card-content">
                    <h2>Pastalar</h2>
                    <span class="explore-text">Keşfet
                        <svg class="arrow-icon" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><path stroke-linecap="round" stroke-linejoin="round" d="M17 8l4 4m0 0l-4 4m4-4H3" /></svg>
                    </span>
                </div>
            </a>
            <a href="category.html?type=ice-cream" class="category-card bg-ice-cream" aria-label="Dondurmaları İncele">
                <div class="card-overlay"></div>
                <div class="card-content">
                    <h2>Dondurma</h2>
                    <span class="explore-text">Keşfet
                        <svg class="arrow-icon" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><path stroke-linecap="round" stroke-linejoin="round" d="M17 8l4 4m0 0l-4 4m4-4H3" /></svg>
                    </span>
                </div>
            </a>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <div class="footer-divider"></div>
            <p>&copy; 2026 Melipo Coffee. Tüm hakları saklıdır.</p>
            <div class="social-links">
                <a href="#">Instagram</a>
                <span class="dot">•</span>
                <a href="#">Konum</a>
                <span class="dot">•</span>
                <a href="#">İletişim</a>
            </div>
        </footer>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
