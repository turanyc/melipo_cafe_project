<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melipo Cafe</title>
    <link rel="icon" type="image/png" href="assets/logo.png">
    <!-- Modern Typography and Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0b0f19;
            --panel-bg: rgba(22, 28, 45, 0.45);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --primary: #d90429;
            --primary-hover: #ef233c;
            --accent: #ffb703;
            --font-family: 'Outfit', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(217, 4, 41, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(255, 183, 3, 0.05) 0%, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            padding: 20px;
        }

        /* Ambient floating light animations */
        .ambient-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--primary);
            filter: blur(150px);
            opacity: 0.15;
            border-radius: 50%;
            z-index: 1;
            pointer-events: none;
            animation: floatGlow 10s infinite alternate ease-in-out;
        }

        @keyframes floatGlow {
            0% { transform: translate(-50px, -50px) scale(1); }
            100% { transform: translate(50px, 50px) scale(1.2); }
        }

        .landing-card {
            max-width: 500px;
            width: 100%;
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 48px 32px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
            z-index: 2;
            position: relative;
            animation: cardEntrance 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-container {
            margin-bottom: 24px;
        }

        .logo {
            height: 90px;
            width: auto;
            filter: drop-shadow(0 4px 20px rgba(217, 4, 41, 0.2)) invert(1);
            animation: logoPulse 4s infinite ease-in-out;
        }

        @keyframes logoPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.04); }
        }

        .title {
            font-size: 2.2rem;
            font-weight: 800;
            color: #fff;
            margin-bottom: 12px;
            letter-spacing: -0.8px;
            background: linear-gradient(135deg, #fff 0%, #cbd5e1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 1rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 36px;
            font-weight: 400;
        }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border-color) 20%, var(--border-color) 80%, transparent);
            margin-bottom: 36px;
        }

        .menu-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: var(--primary);
            color: #fff;
            text-decoration: none;
            padding: 16px 32px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 1.05rem;
            box-shadow: 0 10px 25px rgba(217, 4, 41, 0.3);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            width: 100%;
        }

        .menu-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 14px 30px rgba(217, 4, 41, 0.4);
        }

        .menu-btn:active {
            transform: translateY(0);
        }

        .footer {
            position: absolute;
            bottom: 24px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.3);
            text-align: center;
            width: 100%;
            z-index: 2;
        }
    </style>
</head>
<body>

    <div class="ambient-glow"></div>

    <div class="landing-card">
        <div class="logo-container">
            <img src="assets/loading/logo.png" alt="Melipo Cafe Logo" class="logo">
        </div>
        <h1 class="title">Melipo Cafe</h1>
        <p class="subtitle">Eşsiz tatlılarımız, taze kahvelerimiz ve yeni web sitemizle çok yakında hizmetinizde olacağız.</p>
        
        <div class="divider"></div>

        <a href="menu" class="menu-btn">
            Dijital Menüyü Gör <i class="fa-solid fa-arrow-right"></i>
        </a>
    </div>

    <div class="footer">
        &copy; 2026 Melipo Cafe. Tüm Hakları Saklıdır.
    </div>

</body>
</html>
